name: myapp-tests

on:
  push:
    branches: ["**"]
    paths:
      - "tests/myapp/**"
      - "tests/myapp/conftest.py"
      - "src/**"
      - "requirements.txt"
      - ".github/workflows/myapp-tests.yml"
  pull_request:
    paths:
      - "tests/myapp/**"
      - "tests/myapp/conftest.py"
      - "src/**"
      - "requirements.txt"
      - ".github/workflows/myapp-tests.yml"
  workflow_dispatch:

jobs:
  myapp-pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          playwright install chromium

      - name: Run myapp tests
        env:
          PYTHONPATH: .
        run: |
          mkdir -p playwright-results/screenshots
          pytest -q tests/myapp -v --html=playwright-results/html-report/report.html

      - name: Upload Playwright results and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.run_id }}
          path: |
            playwright-results/**
            test-results/**
            playwright-report/**
            **/screenshots/**
            **/*screenshot*.png
          if-no-files-found: warn
          retention-days: 14
